name: Build Kodi for Ubuntu LTS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Opt into Node.js 24 for all actions. Node 20 is deprecated and will be
  # forced to Node 24 on June 2, 2026 and removed September 16, 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        ubuntu-version: ['24.04']
        # To add Ubuntu 26.04: append '26.04' above and create patches/ubuntu-26.04/
    runs-on: ubuntu-${{ matrix.ubuntu-version }}
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write      # required for artifact attestations
      attestations: write  # required for artifact attestations

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned

      - name: Read VERSION
        run: |
          source VERSION
          echo "KODI_VERSION=$KODI_VERSION" >> $GITHUB_ENV
          echo "DEBIAN_REVISION=$DEBIAN_REVISION" >> $GITHUB_ENV
          ubuntu_ver="${{ matrix.ubuntu-version }}"
          echo "UBUNTU_VERSION_NODOT=${ubuntu_ver//./}" >> $GITHUB_ENV

      - name: Print build environment
        run: |
          echo "=== Runner OS ==="
          lsb_release -a
          echo ""
          echo "=== Compiler ==="
          gcc --version
          g++ --version
          echo ""
          echo "=== dpkg ==="
          dpkg --version
          echo ""
          echo "=== Kodi build target ==="
          source VERSION
          echo "KODI_VERSION=${KODI_VERSION}  DEBIAN_REVISION=${DEBIAN_REVISION}  UBUNTU=${{ matrix.ubuntu-version }}"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
            /usr/local/.ghcup /usr/local/share/powershell \
            /opt/hostedtoolcache
          df -h /

      - name: Workaround dpkg-genbuildinfo slowness
        # GitHub Actions runners have large pre-installed tools in /usr/local
        # (Android SDK, .NET, ghcup, PowerShell). dpkg-genbuildinfo scans all
        # files to generate checksums, which takes 5-20 minutes. Moving /usr/local
        # out of the way prevents this.
        # See: https://github.com/actions/runner-images/issues/13150
        run: |
          if [ -d /usr/local ]; then
            sudo mv /usr/local /usr/local.bak
          fi

      - name: Install base tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential devscripts debhelper dh-python \
            dpkg-dev fakeroot lintian quilt equivs wget \
            debian-keyring

      - name: Fetch Debian source
        run: bash scripts/fetch-source.sh

      - name: Patch for Ubuntu ${{ matrix.ubuntu-version }}
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu-version }}
        run: bash scripts/patch-for-ubuntu.sh

      - name: Install build dependencies
        run: |
          cd build/kodi-${{ env.KODI_VERSION }}+dfsg/
          sudo mk-build-deps -i -t 'apt-get -y --no-install-recommends' || {
            echo "Warning: mk-build-deps returned non-zero, attempting recovery..." >&2
          }
          sudo apt-get -f install -y

      - name: Build
        run: |
          cd build/kodi-${{ env.KODI_VERSION }}+dfsg/
          dpkg-buildpackage -us -uc -b -j$(nproc) 2>&1 | tee ../../build.log

      - name: Collect .deb files
        run: |
          mkdir -p output
          cp build/*.deb output/ 2>/dev/null || true
          ls -lh output/

      - name: Attest build provenance
        # Attestations require a public repo — this step is non-fatal so
        # builds succeed while the repo is private, and attestations start
        # working automatically once the repo goes public.
        if: success()
        continue-on-error: true
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3 pinned
        with:
          subject-path: output/*.deb

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6 pinned
        with:
          name: kodi-${{ env.KODI_VERSION }}-ubuntu${{ env.UBUNTU_VERSION_NODOT }}-debs
          path: output/*.deb
          retention-days: 30

      - name: Rename build log
        if: always()
        run: mv build.log build-ubuntu${{ env.UBUNTU_VERSION_NODOT }}.log || true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6 pinned
        with:
          name: build-logs-ubuntu${{ env.UBUNTU_VERSION_NODOT }}
          path: build-ubuntu${{ env.UBUNTU_VERSION_NODOT }}.log
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned

      - name: Read VERSION
        run: |
          source VERSION
          echo "KODI_VERSION=$KODI_VERSION" >> $GITHUB_ENV

      - name: Download .deb artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6 pinned
        with:
          pattern: kodi-${{ env.KODI_VERSION }}-ubuntu*-debs
          path: debs/
          merge-multiple: true

      - name: Download build logs
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6 pinned
        with:
          pattern: build-logs-ubuntu*
          path: logs/
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum debs/*.deb | tee debs/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2 pinned
        with:
          files: |
            debs/*.deb
            debs/SHA256SUMS
            logs/*.log
          generate_release_notes: true

  update-apt-repo:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: apt-repo-update
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout source (for VERSION file)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned
        with:
          sparse-checkout: VERSION
          sparse-checkout-cone-mode: false

      - name: Read VERSION
        run: |
          source VERSION
          echo "KODI_VERSION=$KODI_VERSION" >> $GITHUB_ENV

      - name: Download .deb artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6 pinned
        with:
          pattern: kodi-${{ env.KODI_VERSION }}-ubuntu*-debs
          path: debs/
          merge-multiple: true

      - name: Install reprepro
        run: sudo apt-get update -qq && sudo apt-get install -y -qq reprepro

      - name: Import GPG key
        run: echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Get GPG key ID
        run: |
          KEY_ID=$(gpg --list-keys --keyid-format long --with-colons | awk -F: '/^pub:/{print $5}' | head -1)
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV

      - name: Determine target codename from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ ubuntu([0-9]{2})([0-9]{2})\. ]]; then
            UBUNTU_VER="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
            echo "Error: cannot parse Ubuntu version from tag: $TAG" >&2
            exit 1
          fi
          case "$UBUNTU_VER" in
            24.04) echo "CODENAME=noble" >> $GITHUB_ENV ;;
            *)
              echo "Error: no codename mapping for Ubuntu $UBUNTU_VER in apt repo job" >&2
              exit 1
              ;;
          esac

      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 pinned
        with:
          ref: gh-pages
          path: gh-pages

      - name: Configure reprepro
        run: |
          mkdir -p gh-pages/conf
          cat > gh-pages/conf/distributions <<EOF
          Origin: kodi-ubuntu-debs
          Label: Kodi Ubuntu Debs
          Suite: noble
          Codename: noble
          Architectures: amd64
          Components: main
          Description: Unofficial Kodi packages for Ubuntu 24.04 LTS
          SignWith: ${{ env.GPG_KEY_ID }}
          EOF

      - name: Add packages to apt repo
        run: |
          cd gh-pages
          for deb in ../debs/*.deb; do
            reprepro --basedir . includedeb "${{ env.CODENAME }}" "$deb"
          done

      - name: Export public GPG key
        run: |
          gpg --armor --export "${{ env.GPG_KEY_ID }}" > gh-pages/kodi-ubuntu-debs.gpg.key
          gpg --export "${{ env.GPG_KEY_ID }}" > gh-pages/kodi-ubuntu-debs.gpg

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update apt repo for ${GITHUB_REF#refs/tags/}"
          git push origin gh-pages
